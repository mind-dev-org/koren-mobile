name: CI - Flutter

on:
  pull_request:
    branches: [main, develop]

jobs:
  analyze-and-test: 
    runs-on: ubuntu-latest

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: setup flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'

      - name: dependencies
        run: flutter pub get

      - name: analyze
        run: flutter analyze

      - name: tests
        run: flutter test
